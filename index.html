<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>California Trees &amp; Hot Springs</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Filter bar -->
  <nav id="filter-bar" role="navigation" aria-label="Filter locations">
    <button class="filter-btn is-active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="tree">
      <span class="filter-icon">🌲</span> Trees
    </button>
    <button class="filter-btn" data-filter="hotspring">
      <span class="filter-icon">♨️</span> Hot Springs
    </button>
    <button class="filter-btn" data-filter="waterfall">
      <span class="filter-icon">💧</span> Waterfalls
    </button>
    <button class="filter-btn" data-filter="pops">
      <span class="filter-icon">🏛️</span> POPS
    </button>
    <div id="search-divider"></div>
    <input id="search-input" type="search" placeholder="Search…" autocomplete="off" aria-label="Search locations" aria-expanded="false" aria-controls="search-results" aria-autocomplete="list">
  </nav>

  <!-- Search results dropdown -->
  <ul id="search-results" role="listbox" aria-label="Search results"></ul>

  <!-- Locate button -->
  <button id="locate-btn" aria-label="Show my location" title="Show my location" data-state="idle" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2L3 21l9-4 9 4L12 2z"/>
    </svg>
  </button>

  <!-- Map container -->
  <div id="map" role="main" aria-label="California map"></div>

  <!-- Mobile scrim -->
  <div id="scrim" aria-hidden="true"></div>

  <!-- Info panel (bottom sheet on mobile, sidebar on desktop) -->
  <aside id="info-panel" role="complementary" aria-label="Location details" aria-hidden="true">
    <button id="close-btn" aria-label="Close panel">×</button>

    <div id="panel-hero" style="display:none;">
      <img id="panel-image" alt="" />
      <small id="panel-attribution"></small>
    </div>

    <div id="panel-content">
      <span id="type-badge"></span>
      <h2 id="panel-name"></h2>
      <p id="panel-location"></p>
      <p id="panel-description"></p>
      <div id="panel-tags"></div>
      <a id="panel-source" href="#" target="_blank" rel="noopener noreferrer">
        Learn more ↗
      </a>
    </div>
  </aside>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
